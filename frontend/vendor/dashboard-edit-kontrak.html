<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Tipe Kontrak</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="sidebar-logo">
    <img
        src="logomanajemen.png"
        alt="CDX Express Logo">
  </div>
  <div class="menu">
    <div class="menu-category">AKTIVITAS</div>
    <a href="dashboard-daftar-id.html" >Daftar ID Pekerja</a>
    <a href="dashboard-aktivasi-id.html">Aktivasi ID</a>
    <a href="dashboard-mutasi-id.html">Mutasi ID</a>
    <a href="dashboard-edit-kontrak.html" class="active">Edit Tipe Kontrak</a>
    <div class="menu-category">MANAJEMEN</div>
    <a href="dashboard-data-pekerja.html">Data Pekerja</a>
    <a href="dashboard-aktivitas.html">Riwayat</a>
    <div class="menu-category">AKUN</div>
    <a href="dashboard-akun.html">Akun Pengguna</a>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <div class="navbar">
    <div>Edit Tipe Kontrak</div>
    <div>👤 Vendor</div>
  </div>

  <div class="card">

    <p class="note">
      Gunakan fitur ini untuk mengubah tipe kontrak atau departemen pekerja.
    </p>

    <!-- CHECK ID -->
    <div class="check-row">
      <input type="text" id="idInput" placeholder="Masukkan ID Pekerja">
      <button class="btn" onclick="checkID()">Check</button>
    </div>

    <!-- FORM -->
    <div class="form-grid">

      <div class="form-group">
        <label>Nama Lengkap</label>
        <input type="text" id="nama" readonly>
      </div>

      <div class="form-group">
        <label>NIK</label>
        <input type="text" id="nik" readonly>
      </div>

      <div class="form-group">
        <label>Agency</label>
        <input type="text" id="agency" readonly>
      </div>

      <div class="form-group">
        <label>Kontrak Saat Ini</label>
        <input type="text" id="kontrak_lama" readonly>
      </div>

      <div class="form-group">
        <label>Departemen Saat Ini</label>
        <input type="text" id="dept_lama" readonly>
      </div>

      <div class="form-group">
        <label>Lokasi Saat Ini</label>
        <input type="text" id="lokasi_lama" readonly>
      </div>

      <div class="form-group">
        <label>Kontrak Baru</label>
        <select id="kontrak_baru">
          <option>Pilih Jenis Kontrak</option>
          <option>Daily Worker - Vendor A</option>
          <option>Contract Month - Vendor A</option>
          <option>Dedicate - Vendor A</option>
        </select>
      </div>

      <div class="form-group">
        <label>Departemen Baru</label>
        <select id="dept_baru">
          <option>Semua Department</option>
          <option>Cache Oprator</option>
          <option>IT Oprator</option>
          <option>SOC Oprator</option>
          <option>FH Oprator</option>
          <option>Return Oprator</option>
          <option>Admin</option>
        </select>
      </div>

    </div>

    <button class="btn btn-main" onclick="simpanPerubahan()">Simpan Perubahan </button>

  </div>

</div>

<script>

// =========================
// PROTEKSI LOGIN
// =========================
const user = JSON.parse(

    localStorage.getItem(
        "user"
    )
);


// =========================
// JIKA BELUM LOGIN
// =========================
if (!user) {

    alert(
        "Silakan login terlebih dahulu"
    );

    window.location.href =
    "dashboard-login.html";
}

</script>

<script>

// =======================
// CHECK ID
// =======================
function checkID() {

  const id = document.getElementById("idInput").value;

  fetch(`http://127.0.0.1:8000/worker/${id}`)
  .then(res => res.json())
  .then(data => {

    if (data.message) {
      alert("ID tidak ditemukan");
      return;
    }

    document.getElementById("nama").value = data.nama;
    document.getElementById("nik").value = data.nik;
    document.getElementById("agency").value = data.agency;

    document.getElementById("kontrak_lama").value = data.kontrak;
    document.getElementById("dept_lama").value = data.dept;
    document.getElementById("lokasi_lama").value = data.lokasi;

  })
  .catch(() => {
    alert("Gagal mengambil data");
  });
}


// =======================
// SIMPAN PERUBAHAN
// =======================
function simpanPerubahan() {

  const id = document.getElementById("idInput").value;

  const tipe_kontrak = document.getElementById("kontrak_baru").value;
  const departemen = document.getElementById("dept_baru").value;

  if (!id || !tipe_kontrak || !departemen) {
    alert("Lengkapi data");
    return;
  }

  fetch("http://127.0.0.1:8000/edit-contract", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      id_pekerja: id,
      tipe_kontrak: tipe_kontrak,
      departemen: departemen
    })
  })
  .then(res => res.json())
  .then(data => {
    alert(data.message);
  })
  .catch(() => {
    alert("Gagal update kontrak");
  });

}
</script>

</body>
</html>
