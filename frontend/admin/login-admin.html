<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - CDX Express</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="/frontend/admin/css/style.css" rel="stylesheet">
</head>
<body class="login-page">

    <div class="logo">
        <img src="/frontend/admin/imglogo/logomanajemen.png" alt="CDX Express Logo">
    </div>

    <div class="login-container">
        <div class="admin-avatar">
            <!-- Placeholder for Delivery Guy Avatar -->
            <i class="fas fa-user-shield"></i> 
        </div>
        
        <h2>Login As Admin</h2>

        <form onsubmit="loginAdmin(event)">

            <div class="form-group">
                <i class="fas fa-clock"></i>
                <select id="shift_admin" required>
                    <option value="">
                        Pilih Shift
                    </option>
                    <option value="Shift 1 (08-16)">
                        Shift 1 (08-16)
                    </option>
                    <option value="Shift 2 (16-00)">
                        Shift 2 (16-00)
                    </option>
                    <option value="Shift 3 (00-08)">
                        Shift 3 (00-08)
                    </option>
                </select>
            </div>

            <div class="form-group">
                <i class="fas fa-id-card"></i>
                <input
                type="text"
                id="admin_id"
                placeholder="ID Admin"
                equired>
            </div>
            
            <div class="form-group">
                <i class="fas fa-lock"></i>
                <input 
                type="password"
                id="password"
                placeholder="Password" 
                required>
            </div>

            <button type="submit" class="btn-login">Login</button>
        </form>
    </div>

<script>

async function loginAdmin(event) {

    // =========================
    // STOP REFRESH FORM
    // =========================
    event.preventDefault();


    // =========================
    // AMBIL DATA INPUT
    // =========================
    const admin_id =
        document.getElementById(
            "admin_id"
        ).value;

    const password =
        document.getElementById(
            "password"
        ).value;


    try {

        // =========================
        // FETCH LOGIN
        // =========================
        const response = await fetch(

            "/login-admin",

            {

                method: "POST",

                headers: {
                    "Content-Type":
                    "application/json"
                },

                body: JSON.stringify({

                    admin_id,
                    password
                })
            }
        );


        const result =
            await response.json();


        console.log(result);


        // =========================
        // LOGIN BERHASIL
        // =========================
        if (
            result.message ===
            "Login berhasil"
        ) {

            // =========================
            // SIMPAN DATA ADMIN
            // =========================
            localStorage.setItem(

                "adminData",

                JSON.stringify(result)
            );


            alert("Login berhasil");


            window.location.href =
            "/frontend/admin/admin-verifikasi-id.html";

        }

        else {

            alert(result.message);

        }


    } catch (error) {

        console.log(error);

        alert("Gagal koneksi ke server");

    }

}

</script>

</body>
</html>
